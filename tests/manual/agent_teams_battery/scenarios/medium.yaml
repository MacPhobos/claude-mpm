# Medium tasks: multi-file investigation across 2-3 independent subsystems
# Expected behavior: team_spawn (2-3 independent questions benefit from parallel research)
- id: "medium-01"
  stratum: "medium"
  description: "Research hook system architecture and event handler dispatch"
  prompt: "Research how the hook system works in this project and how event handlers dispatch hook events. Specifically: (1) how does src/claude_mpm/hooks/claude_hooks/hook_handler.py receive and process events, and (2) how does src/claude_mpm/hooks/claude_hooks/event_handlers.py decide which handler to invoke?"
  expected_behavior: "team_spawn"
  scoring_criteria:
    evidence_required: true
    manifest_required: false
    forbidden_phrases: true
    max_duration_seconds: 600

