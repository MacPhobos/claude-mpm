- id: "complex-01"
  stratum: "complex"
  description: "Security audit of hook system, environment variable management, and tool access control"
  prompt: "Conduct a security audit across three independent areas of this codebase: (1) examine the hook system in src/claude_mpm/hooks/claude_hooks/ for any inputs that are passed to shell commands, file paths that are not validated, or secrets that might be logged; (2) review how environment variables are handled in src/claude_mpm/core/env_defaults.py and src/claude_mpm/services/environment/ for any leakage or insecure defaults; and (3) audit the tool access control in src/claude_mpm/core/tool_access_control.py for policy gaps or bypass vectors. Summarise findings per area."
  expected_behavior: "team_spawn"
  scoring_criteria:
    evidence_required: true
    manifest_required: false
    forbidden_phrases: true
    max_duration_seconds: 1800

